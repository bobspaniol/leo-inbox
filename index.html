<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inbox Leo</title>
<style>
body { font-family: sans-serif; max-width: 480px; margin: 32px auto; padding: 16px; }
h2 { margin-bottom: 4px; }
#status { color: #666; font-size: .9rem; min-height: 1.4em; margin-bottom: 8px; }
textarea { width: 100%; height: 120px; font-size: 1rem; padding: 8px; box-sizing: border-box; border-radius: 6px; border: 1px solid #ccc; }
button { display: block; width: 100%; padding: 18px; font-size: 1.1rem; margin: 10px 0 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
#btnGravar  { background: #e53935; color: #fff; }
#btnGravar.gravando { background: #7f0000; }
#btnEnviar  { background: #2e7d32; color: #fff; }
</style>
</head>
<body>
<h2>Inbox Leo</h2>
<p id="status">Pronto pra gravar.</p>
<button id="btnGravar" onclick="toggleGravar()">🎤 Gravar</button>
<textarea id="texto" placeholder="Fala que aparece aqui. Você pode editar antes de enviar."></textarea>
<button id="btnEnviar" onclick="enviar()">Enviar pro Forms ➜</button>
<script src="script.js"></script>
</body>
</html>
